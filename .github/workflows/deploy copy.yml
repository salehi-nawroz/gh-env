name: Deployment
on:
  push:
    branches:
      - master
env: MONGODB_DB_NAME:ghademo
jobs:
  test:
    env: MONGODB_CLUSTER_ADDRESS:cluster0.grt6yzv.mongodb.net
      MONGODB_USERNAME:salehinawroz_db_user
      MONGODB_PASSWORD:hwvmiIyS3EXBX2wY
      PORT:3000
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          echo "MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}"
